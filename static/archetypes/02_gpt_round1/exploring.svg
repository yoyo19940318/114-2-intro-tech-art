      <stop offset="0.55" stop-color="#0EA5E9" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="456" cy="500" r="380" fill="url(#ambient)"/>
